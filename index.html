<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       THEME TOKENS
    ═══════════════════════════════════════════ */
    [data-theme="dark"] {
      --page-bg:      #130f0c;
      --page-glow:    rgba(217,119,87,0.05);
      --win-bg:       #1c1712;
      --win-bar:      #100e0a;
      --win-border:   rgba(217,119,87,0.13);
      --win-border-h: rgba(217,119,87,0.30);
      --inset-bg:     #15100c;
      --inset-border: rgba(217,119,87,0.08);
      --hover-bg:     rgba(217,119,87,0.05);

      --or:           #D97757;
      --or-dim:       #9a4a28;
      --or-muted:     rgba(217,119,87,0.50);
      --or-faint:     rgba(217,119,87,0.10);

      --tx:           #e8d9c4;
      --tx-dim:       #9e8e79;
      --tx-muted:     #5a4b3a;

      --green:        #4e9666;
      --yellow:       #c08030;
      --blue:         #4e7eaa;
      --red:          #a84040;

      --scan:         rgba(0,0,0,0.07);
    }

    [data-theme="light"] {
      --page-bg:      #f5f0ea;
      --page-glow:    rgba(184,76,30,0.04);
      --win-bg:       #ffffff;
      --win-bar:      #ede6dd;
      --win-border:   rgba(160,81,46,0.16);
      --win-border-h: rgba(160,81,46,0.38);
      --inset-bg:     #f9f4ef;
      --inset-border: rgba(160,81,46,0.10);
      --hover-bg:     rgba(160,81,46,0.05);

      --or:           #b84c1e;
      --or-dim:       #c8633a;
      --or-muted:     rgba(184,76,30,0.55);
      --or-faint:     rgba(184,76,30,0.08);

      --tx:           #2a1f14;
      --tx-dim:       #60503e;
      --tx-muted:     #9e8070;

      --green:        #2a6e42;
      --yellow:       #8a5e18;
      --blue:         #2a5080;
      --red:          #882828;

      --scan:         rgba(0,0,0,0);
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 14px; }

    body {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: var(--page-bg);
      color: var(--tx);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      position: relative;
      overflow-x: hidden;
    }

    /* CRT scanlines (dark only) */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        var(--scan) 3px, var(--scan) 4px
      );
      pointer-events: none;
      z-index: 9000;
    }

    /* Warm radial glow */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 40% at 50% 0%, var(--page-glow), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════
       PAGE
    ═══════════════════════════════════════════ */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.6rem 1.5rem 4rem;
      position: relative;
      z-index: 1;
    }

    /* ═══════════════════════════════════════════
       GLOBAL HEADER
    ═══════════════════════════════════════════ */
    .g-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.2rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid var(--win-border);
    }

    .g-prompt { display: flex; flex-direction: column; gap: 0.22rem; }

    .g-prompt-line { display: flex; align-items: center; gap: 0.5rem; }

    .g-sigil {
      color: var(--or);
      font-weight: 700;
      font-size: 0.95rem;
      user-select: none;
    }

    .g-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--tx);
      letter-spacing: 0.02em;
    }

    .g-cursor {
      display: inline-block;
      width: 8px; height: 0.9rem;
      background: var(--or);
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 1.1s step-end infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .g-meta {
      font-size: 0.68rem;
      color: var(--tx-muted);
      padding-left: 1.25rem;
    }

    .g-meta b { color: var(--or-muted); font-weight: 400; }

    .g-controls { display: flex; gap: 0.38rem; align-items: center; }

    .g-btn {
      font-family: inherit;
      font-size: 0.67rem;
      color: var(--tx-muted);
      background: var(--inset-bg);
      border: 1px solid var(--inset-border);
      padding: 0.28rem 0.6rem;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .g-btn:hover {
      color: var(--or);
      border-color: var(--or-dim);
      background: var(--or-faint);
    }

    /* ═══════════════════════════════════════════
       TERMINAL WINDOW
    ═══════════════════════════════════════════ */
    .term-win {
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: 9px;
      margin-bottom: 1.3rem;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.3s;
    }

    .term-win:hover {
      border-color: var(--win-border-h);
      box-shadow: 0 8px 44px rgba(0,0,0,0.16), 0 0 0 1px var(--or-faint);
    }

    /* ── macOS title bar ── */
    .term-bar {
      background: var(--win-bar);
      border-bottom: 1px solid var(--win-border);
      height: 36px;
      padding: 0 13px;
      display: flex;
      align-items: center;
      position: relative;
      transition: background 0.3s;
      user-select: none;
    }

    /* Traffic light dots */
    .tl-dots { display: flex; align-items: center; gap: 7px; }

    .tl-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    /* Bright when window hovered */
    .term-win:hover .tl-dot.close  { background: #FF5F57; }
    .term-win:hover .tl-dot.mini   { background: #FFBD2E; }
    .term-win:hover .tl-dot.expand { background: #28C840; }

    /* Dimmed otherwise */
    .tl-dot.close  { background: #6e3030; }
    .tl-dot.mini   { background: #6e5a20; }
    .tl-dot.expand { background: #1e5028; }

    /* Centered title */
    .bar-title {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--tx-dim);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 0.02em;
    }

    /* Right index */
    .bar-idx {
      margin-left: auto;
      font-size: 0.62rem;
      color: var(--or-muted);
      font-weight: 700;
    }

    /* ── Terminal body ── */
    .term-body { padding: 1.3rem 1.5rem 1.55rem; }

    /* Project title row */
    .proj-name-row {
      display: flex;
      align-items: baseline;
      gap: 0.55rem;
      margin-bottom: 0.32rem;
    }

    .proj-sigil { color: var(--or); font-weight: 700; font-size: 0.82rem; }

    .proj-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--tx);
      letter-spacing: 0.01em;
    }

    .proj-desc {
      font-size: 0.72rem;
      color: var(--tx-dim);
      line-height: 1.65;
      padding-left: 1.25rem;
      margin-bottom: 1.1rem;
    }

    .proj-desc::before { content: '# '; color: var(--tx-muted); }

    /* Section label */
    .sec-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tx-muted);
      margin-bottom: 0.45rem;
      display: flex;
      align-items: center;
      gap: 0.32rem;
    }

    .sec-label::before { content: '//'; color: var(--or-dim); }

    /* ── Progress ── */
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.36rem;
    }

    .progress-hint {
      font-size: 0.64rem;
      color: var(--tx-muted);
      cursor: pointer;
      transition: color 0.15s;
    }

    .progress-hint:hover { color: var(--or); }

    .progress-pct {
      font-size: 0.77rem;
      font-weight: 700;
      color: var(--or);
    }

    .bar-track {
      height: 5px;
      background: var(--inset-bg);
      border: 1px solid var(--inset-border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 0;
    }

    .bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      background: linear-gradient(90deg,
        #5a2a10 0%, #9a4020 22%,
        #D97757 62%, #f0a882 100%
      );
    }

    /* ── Steps panel ── */
    .steps-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.38s ease;
    }

    .steps-panel.open { max-height: 600px; }

    .steps {
      list-style: none;
      background: var(--inset-bg);
      border: 1px solid var(--inset-border);
      border-radius: 4px;
      padding: 0.38rem;
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.08rem;
    }

    .steps li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0.55rem;
      border-radius: 3px;
      font-size: 0.73rem;
      transition: background 0.14s;
    }

    .steps li:hover { background: var(--hover-bg); }

    .step-icon {
      font-size: 0.67rem;
      font-weight: 700;
      width: 13px;
      text-align: center;
      flex-shrink: 0;
    }

    .step-done    .step-icon { color: var(--green); }
    .step-current .step-icon { color: var(--yellow); }
    .step-pending .step-icon { color: var(--tx-muted); }

    .step-done    .step-text { color: var(--tx); }
    .step-current .step-text { color: var(--tx); }
    .step-pending .step-text { color: var(--tx-dim); }

    .step-link {
      margin-left: auto;
      font-size: 0.63rem;
      color: var(--blue);
      text-decoration: none;
      opacity: 0.55;
      transition: opacity 0.18s;
      flex-shrink: 0;
    }

    .step-link:hover { opacity: 1; }

    /* ── Timeline ── */
    .tl-section { margin-top: 1.25rem; }

    .venue-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.72rem;
    }

    .venue-arrow { color: var(--or-dim); font-size: 0.68rem; }

    .venue-name {
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--blue);
    }

    .venue-name a { color: var(--blue); text-decoration: none; }
    .venue-name a:hover { text-decoration: underline; }

    .timeline {
      display: flex;
      position: relative;
      padding: 0 4px;
    }

    .tl-track {
      position: absolute; top: 6px; left: 0; right: 0;
      height: 2px;
      background: var(--inset-border);
      border-radius: 1px;
    }

    .tl-fill {
      position: absolute; top: 6px; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #1a3050, #4e7eaa, #80aad0);
      border-radius: 1px;
      transition: width 0.6s ease;
    }

    .tl-event {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .tl-node {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--win-bg);
      border: 2px solid var(--tx-muted);
      margin-bottom: 0.48rem;
      transition: all 0.3s;
    }

    .tl-node.past    { background: var(--blue); border-color: var(--blue); }
    .tl-node.current {
      background: var(--win-bg);
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(78,126,170,0.22);
    }
    .tl-node.future  { border-color: var(--tx-muted); opacity: 0.4; }

    .tl-label {
      font-size: 0.57rem;
      text-align: center;
      color: var(--tx-muted);
      line-height: 1.3;
      max-width: 66px;
    }

    .tl-label.past-label    { color: var(--tx-dim); }
    .tl-label.current-label { color: var(--blue); font-weight: 700; }

    .tl-date {
      font-size: 0.54rem;
      color: var(--tx-muted);
      margin-top: 0.1rem;
      opacity: 0.6;
    }

    /* ═══════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════ */
    .g-footer {
      margin-top: 2rem;
      padding-top: 0.9rem;
      border-top: 1px solid var(--win-border);
      display: flex;
      align-items: center;
      gap: 1.1rem;
      font-size: 0.63rem;
      color: var(--tx-muted);
      flex-wrap: wrap;
    }

    .f-online { display: flex; align-items: center; gap: 0.42rem; }
    .f-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      .page { padding: 1.4rem 0.85rem 3rem; }
      .bar-title { display: none; }
      .g-header { flex-wrap: wrap; gap: 0.75rem; }
      .tl-label { font-size: 0.5rem; max-width: 50px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ══ Global header ══ -->
  <div class="g-header">
    <div class="g-prompt">
      <div class="g-prompt-line">
        <span class="g-sigil">~$</span>
        <span class="g-title">project-tracker<span class="g-cursor"></span></span>
      </div>
      <div class="g-meta">
        <b>session</b> &nbsp;·&nbsp; updated <span id="update-date"></span>
      </div>
    </div>
    <div class="g-controls">
      <button class="g-btn" onclick="changeFontSize(-1)">A−</button>
      <button class="g-btn" onclick="changeFontSize(1)">A+</button>
      <button class="g-btn" id="theme-btn" onclick="toggleTheme()"></button>
    </div>
  </div>

  <!-- ══ Projects ══ -->
  <div id="projects-container"></div>

  <!-- ══ Footer ══ -->
  <div class="g-footer">
    <div class="f-online">
      <div class="f-dot"></div>
      <span>daemon active</span>
    </div>
    <span id="proj-count" style="color:var(--or-muted)"></span>
    <span style="margin-left:auto;opacity:0.35">claude terminal v2</span>
  </div>

</div>
<script>
  /* ─── Font size ─── */
  function getFontSize() { return parseInt(localStorage.getItem('pt-fs') || '14'); }
  function applyFontSize(s) { document.documentElement.style.fontSize = s + 'px'; }
  function changeFontSize(d) {
    const s = Math.min(20, Math.max(10, getFontSize() + d));
    localStorage.setItem('pt-fs', s);
    applyFontSize(s);
  }
  applyFontSize(getFontSize());

  /* ─── Theme ─── */
  function getTheme() { return localStorage.getItem('pt-theme') || 'dark'; }
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = t === 'dark' ? '☀ light' : '☾ dark';
  }
  function toggleTheme() {
    const next = getTheme() === 'dark' ? 'light' : 'dark';
    localStorage.setItem('pt-theme', next);
    applyTheme(next);
  }
  applyTheme(getTheme());

  /* ─── Load projects ─── */
  async function loadProjects() {
    const indexRes = await fetch('projects/index.json');
    const files    = await indexRes.json();
    return Promise.all(files.map(f => fetch(`projects/${f}`).then(r => r.json())));
  }

  const ICONS = { done: '✓', current: '▸', pending: '·' };

  function calcProgress(steps) {
    const w = { done: 1, current: 0.5, pending: 0 };
    return Math.round(steps.reduce((s, st) => s + (w[st.status] || 0), 0) / steps.length * 100);
  }

  function tlStatus(events) {
    const today = new Date(); today.setHours(0,0,0,0);
    return events.map((ev, i) => {
      const d  = new Date(ev.date + 'T00:00:00');
      const nx = i < events.length - 1 ? new Date(events[i+1].date + 'T00:00:00') : null;
      const s  = today >= d ? (nx === null || today < nx ? 'current' : 'past') : 'future';
      return { ...ev, status: s };
    });
  }

  function tlFill(events) {
    const today = new Date(); today.setHours(0,0,0,0);
    const dates = events.map(e => new Date(e.date + 'T00:00:00'));
    if (today <= dates[0]) return 0;
    if (today >= dates[dates.length - 1]) return 100;
    for (let i = 0; i < dates.length - 1; i++) {
      if (today >= dates[i] && today < dates[i+1]) {
        const a = i / (dates.length - 1) * 100;
        const b = (i + 1) / (dates.length - 1) * 100;
        return a + (today - dates[i]) / (dates[i+1] - dates[i]) * (b - a);
      }
    }
    return 0;
  }

  function fmtDate(s) {
    return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function toggle(id) { document.getElementById(id).classList.toggle('open'); }

  function render(projects) {
    document.getElementById('proj-count').textContent =
      `${projects.length} project${projects.length !== 1 ? 's' : ''} tracked`;

    document.getElementById('projects-container').innerHTML = projects.map((p, i) => {
      const pct  = calcProgress(p.steps);
      const tl   = tlStatus(p.timeline);
      const fill = tlFill(p.timeline);
      const sid  = `steps-${i}`;
      const idx  = String(i + 1).padStart(2, '0');

      return `
      <div class="term-win">

        <div class="term-bar">
          <div class="tl-dots">
            <div class="tl-dot close"></div>
            <div class="tl-dot mini"></div>
            <div class="tl-dot expand"></div>
          </div>
          <div class="bar-title">${p.name}&nbsp;&mdash;&nbsp;${p.venue}</div>
          <div class="bar-idx">[${idx}]</div>
        </div>

        <div class="term-body">

          <div class="proj-name-row">
            <span class="proj-sigil">$</span>
            <span class="proj-name">${p.name}</span>
          </div>
          <div class="proj-desc">${p.description}</div>

          <div class="sec-label">progress</div>
          <div class="progress-top">
            <span class="progress-hint" onclick="toggle('${sid}')">▾ steps (click to expand)</span>
            <span class="progress-pct">${pct}%</span>
          </div>
          <div class="bar-track" onclick="toggle('${sid}')">
            <div class="bar-fill" style="width:${pct}%"></div>
          </div>

          <div class="steps-panel" id="${sid}">
            <ul class="steps">
              ${p.steps.map(s => `
                <li class="step-${s.status}">
                  <span class="step-icon">${ICONS[s.status]}</span>
                  <span class="step-text">${s.label}</span>
                  ${s.link ? `<a href="${s.link}" target="_blank" rel="noopener" class="step-link">[↗ link]</a>` : ''}
                </li>`).join('')}
            </ul>
          </div>

          <div class="tl-section">
            <div class="sec-label">venue &amp; timeline</div>
            <div class="venue-row">
              <span class="venue-arrow">→</span>
              <span class="venue-name">
                ${p.venueUrl
                  ? `<a href="${p.venueUrl}" target="_blank" rel="noopener">${p.venue}</a>`
                  : p.venue}
              </span>
            </div>
            <div class="timeline">
              <div class="tl-track"></div>
              <div class="tl-fill" style="width:${fill}%"></div>
              ${tl.map(ev => `
                <div class="tl-event">
                  <div class="tl-node ${ev.status}"></div>
                  <div class="tl-label ${ev.status}-label">${ev.label}</div>
                  <div class="tl-date">${fmtDate(ev.date)}</div>
                </div>`).join('')}
            </div>
          </div>

        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('update-date').textContent = new Date().toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric'
  });

  loadProjects().then(render).catch(err => {
    document.getElementById('projects-container').innerHTML = `
      <div class="term-win">
        <div class="term-bar">
          <div class="tl-dots">
            <div class="tl-dot close"></div>
            <div class="tl-dot mini"></div>
            <div class="tl-dot expand"></div>
          </div>
          <div class="bar-title">error</div>
        </div>
        <div class="term-body">
          <div class="proj-name-row">
            <span class="proj-sigil" style="color:var(--red)">!</span>
            <span class="proj-name" style="color:var(--red)">load-error</span>
          </div>
          <div class="proj-desc" style="color:var(--tx-muted)">
            could not fetch projects/index.json — ensure the file server is running
          </div>
        </div>
      </div>`;
    console.error(err);
  });
</script>
</body>
</html>
